<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>機場即時航班看板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">TDX static cache / GitHub Pages</p>
        <h1>機場即時航班看板</h1>
      </div>
      <div class="sync-status">
        <span>最後更新</span>
        <strong id="updatedAt">讀取中</strong>
      </div>
    </header>

    <main class="layout">
      <section class="toolbar">
        <label>
          機場
          <select id="airportSelect"></select>
        </label>
        <label>
          方向
          <select id="directionSelect">
            <option value="departure">出發</option>
            <option value="arrival">抵達</option>
          </select>
        </label>
        <label>
          搜尋
          <input id="searchInput" type="search" placeholder="航班、航空、目的地" />
        </label>
      </section>

      <section class="summary">
        <article>
          <span>航班筆數</span>
          <strong id="recordCount">0</strong>
        </article>
        <article>
          <span>延誤/異常</span>
          <strong id="delayCount">0</strong>
        </article>
        <article>
          <span>已飛/抵達</span>
          <strong id="doneCount">0</strong>
        </article>
        <article>
          <span>資料來源</span>
          <strong id="sourceName">TDX</strong>
        </article>
      </section>

      <section class="board-section">
        <div class="section-heading">
          <h2 id="boardTitle">航班列表</h2>
          <p>本頁讀取靜態 JSON，資料由本地排程或 GitHub Actions 更新</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>表定</th>
                <th>預計/實際</th>
                <th>航班</th>
                <th>航空</th>
                <th id="routeHeader">目的地</th>
                <th>航廈/登機門</th>
                <th>狀態</th>
              </tr>
            </thead>
            <tbody id="flightRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
