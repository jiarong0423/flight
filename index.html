<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航班價格月曆</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="calendar-header">
        <div>
          <p class="eyebrow">Fixed schedule + change overlay</p>
          <h1>航班價格月曆</h1>
        </div>
        <div class="sync-status">
          <span>最後更新</span>
          <strong id="updatedAt">讀取中</strong>
        </div>
      </header>

      <section class="toolbar">
        <label>
          航線
          <select id="routeSelect"></select>
        </label>
        <label>
          月份
          <input id="monthInput" type="month" />
        </label>
      </section>

      <section class="calendar-card">
        <div class="month-title">
          <button id="prevMonth" type="button" aria-label="上一月">‹</button>
          <h2 id="monthTitle">月曆</h2>
          <button id="nextMonth" type="button" aria-label="下一月">›</button>
        </div>
        <div class="weekday-row">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="detail-panel">
        <button id="detailToggle" class="detail-toggle" type="button">
          <span id="detailTitle">選擇日期</span>
          <span id="detailCount">0 筆</span>
        </button>
        <div id="detailBody" class="detail-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>時間</th>
                  <th>航班</th>
                  <th>價格</th>
                  <th>轉機</th>
                  <th>托運</th>
                  <th>手提</th>
                  <th>狀態</th>
                  <th>連結</th>
                </tr>
              </thead>
              <tbody id="detailRows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
