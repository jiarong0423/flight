<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航班價格月曆</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="calendar-header">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Fixed schedule + change overlay</p>
          <h1 data-i18n="appTitle">航班價格月曆</h1>
        </div>
        <div class="header-actions">
          <label class="language-picker">
            <span data-i18n="language">語言</span>
            <select id="languageSelect" aria-label="Language">
              <option value="zh">中</option>
              <option value="en">EN</option>
              <option value="ja">日</option>
              <option value="ko">韓</option>
            </select>
          </label>
          <div class="sync-status">
            <span data-i18n="updatedAt">最後更新</span>
            <strong id="updatedAt">讀取中</strong>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <label>
          <span data-i18n="route">航線</span>
          <select id="routeSelect"></select>
        </label>
        <label>
          <span data-i18n="month">月份</span>
          <input id="monthInput" type="month" />
        </label>
      </section>

      <section class="calendar-card">
        <div class="month-title">
          <button id="prevMonth" type="button" aria-label="上一月">‹</button>
          <h2 id="monthTitle">月曆</h2>
          <button id="nextMonth" type="button" aria-label="下一月">›</button>
        </div>
        <div id="weekdayRow" class="weekday-row">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="detail-panel">
        <button id="detailToggle" class="detail-toggle" type="button">
          <span id="detailTitle">選擇日期</span>
          <span id="detailCount">0 筆</span>
        </button>
        <div id="detailBody" class="detail-body">
          <div id="detailRows" class="flight-list"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
